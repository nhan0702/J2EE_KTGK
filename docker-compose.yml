version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cv_mysql
    restart: always
    environment:
      MYSQL_DATABASE: huynhquocnam
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: Nam@123456
      MYSQL_ROOT_PASSWORD: Nam@123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cv_network

  backend:
    build: ./backend
    container_name: cv_backend
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/huynhquocnam?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=ecommerce_user
      - SPRING_DATASOURCE_PASSWORD=Nam@123456
      - CORS_ALLOWED_ORIGIN=http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - cv_network

volumes:
  mysql_data:
 
networks:
  cv_network:
    driver: bridge