services:
  db:
    image: mysql:8.0
    container_name: j2ee_ktgk_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-j2ee_ktgk}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: j2ee_ktgk_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-j2ee_ktgk}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-app_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-123456}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - app_network

volumes:
  mysql_data:
 
networks:
  app_network:
    driver: bridge
