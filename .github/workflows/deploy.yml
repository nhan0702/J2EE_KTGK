name: Build and Push Docker Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    name: Build, Test and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: j2ee_ktgk
          MYSQL_USER: app_user
          MYSQL_PASSWORD: 123456
          MYSQL_ROOT_PASSWORD: 123456
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission for Maven wrapper
        run: chmod +x mvnw

      - name: Build and test with Maven
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/j2ee_ktgk?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: app_user
          SPRING_DATASOURCE_PASSWORD: 123456
        run: ./mvnw clean verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ format('{0}/j2ee-ktgk', secrets.DOCKERHUB_USERNAME) }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        if: github.event_name == 'push'
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          IMAGE_REPO: ${{ format('{0}/j2ee-ktgk', secrets.DOCKERHUB_USERNAME) }}
          IMAGE_TAG: latest
        run: |
          ENCODED_REPO=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['IMAGE_REPO'], safe=''))")
          ENCODED_TAG=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['IMAGE_TAG'], safe=''))")
          URL="${DEPLOY_URL}?repo=${ENCODED_REPO}&tag=${ENCODED_TAG}"
          echo "Deploy request prepared for image: ${IMAGE_REPO}:${IMAGE_TAG}"

          set +e
          RESPONSE=$(curl --http1.1 --retry 3 --retry-all-errors --retry-delay 5 \
            --connect-timeout 10 --max-time 90 \
            -H "Accept: application/json" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "" \
            -sS -w "\n%{http_code}" -X POST "$URL")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "Khong goi duoc webhook deploy. curl exit code: $CURL_EXIT"
            echo "Loi nay thuong la server dong ket noi som, webhook bi qua tai, hoac DEPLOY_URL co van de."
            exit "$CURL_EXIT"
          fi

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy that bai. Xem chi tiet trong nhom log ben duoi."
            echo "::group::Chi tiet webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thanh cong."
          echo "::group::Chi tiet webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
