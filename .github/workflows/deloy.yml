name: Build and Push Docker Images to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'   # Trigger khi push tag dạng v1.0.0, v2.1.3, ...

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Generate tags & labels cho Backend
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend
          tags: |
            # Tag theo Git tag (vd: v1.2.3)
            type=semver,pattern={{version}}
            # Tag major.minor (vd: v1.2)
            type=semver,pattern={{major}}.{{minor}}
            # Tag major (vd: v1)
            type=semver,pattern={{major}}
            # Tag theo ngày (vd: 20260316)
            type=schedule,pattern={{date 'YYYYMMDD'}}
            # Tag theo commit SHA rút gọn (vd: sha-a3f92bc)
            type=sha,prefix=sha-,format=short
            # Tag latest khi push lên main
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. Generate tags & labels cho Frontend
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # 6. Build & Push Backend Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Build & Push Frontend Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max